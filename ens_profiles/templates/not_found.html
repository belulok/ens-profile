{% extends "base.html" %}
{% block title %}{{ ens_name }} — not found{% endblock %}
{% block content %}
<div class="mt-16 text-center">
  <h1 class="text-3xl font-semibold tracking-tight">Name not found</h1>
  <p class="mt-3 text-zinc-400">
    <code class="font-mono">{{ ens_name }}</code> doesn't resolve to an Ethereum address.
  </p>
  <p class="mt-1 text-sm text-zinc-500">
    The name might not be registered, or it has no resolver set.
  </p>
  <a href="{% url 'search' %}" class="mt-8 inline-block bg-white text-zinc-950 font-medium px-5 py-2.5 rounded-md hover:bg-zinc-200">
    Try another name
  </a>
</div>
{% endblock %}
